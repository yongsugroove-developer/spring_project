<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Planner</title>
    <meta name="description" content="My Planner" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <section class="hero panel">
          <div class="hero-copy-block">
            <div class="hero-topline">
              <p class="eyebrow">my planner</p>
              <details class="settings-panel">
                <summary id="settings-summary" class="settings-summary">Settings</summary>
                <div class="header-controls">
                  <label class="control-box">
                    <span id="language-label">Language</span>
                    <select id="language-select" aria-labelledby="language-label">
                      <option value="ko">Korean</option>
                      <option value="en">English</option>
                      <option value="ja">Japanese</option>
                    </select>
                  </label>
                  <label class="control-box">
                    <span id="theme-label">Theme</span>
                    <select id="theme-select" aria-labelledby="theme-label">
                      <option value="violet">Violet</option>
                      <option value="sunset">Sunset</option>
                      <option value="forest">Forest</option>
                    </select>
                  </label>
                  <label class="control-box">
                    <span id="density-label">Density</span>
                    <select id="density-select" aria-labelledby="density-label">
                      <option value="comfy">Comfy</option>
                      <option value="compact">Compact</option>
                    </select>
                  </label>
                </div>
              </details>
            </div>
            <h1 id="hero-title">Routine Assignment And Progress</h1>
            <p id="hero-copy" class="hero-copy">
              Manage routines, todos, calendar overrides, and statistics in one place.
            </p>
            <div id="hero-focus" class="hero-focus" aria-live="polite"></div>
          </div>
          <div class="hero-metrics">
            <div class="metric-card">
              <span id="hero-label-set">Today's Set</span>
              <strong id="hero-set">-</strong>
            </div>
            <div class="metric-card">
              <span id="hero-label-rate">Today's Rate</span>
              <strong id="hero-rate">0%</strong>
            </div>
            <div class="metric-card">
              <span id="hero-label-streak">Current Streak</span>
              <strong id="hero-streak">0 days</strong>
            </div>
            <div class="metric-card">
              <span id="hero-label-date">Base Date</span>
              <strong id="hero-date">-</strong>
            </div>
          </div>
        </section>

        <nav class="tabs panel" aria-label="Planner sections" role="tablist">
          <button id="tab-button-today" class="tab-button is-active" data-tab="today" type="button" role="tab" aria-controls="tab-today" aria-selected="true">Today</button>
          <button id="tab-button-routines" class="tab-button" data-tab="routines" type="button" role="tab" aria-controls="tab-routines" aria-selected="false">Routines</button>
          <button id="tab-button-todos" class="tab-button" data-tab="todos" type="button" role="tab" aria-controls="tab-todos" aria-selected="false">Todos</button>
          <button id="tab-button-calendar" class="tab-button" data-tab="calendar" type="button" role="tab" aria-controls="tab-calendar" aria-selected="false">Calendar</button>
          <button id="tab-button-stats" class="tab-button" data-tab="stats" type="button" role="tab" aria-controls="tab-stats" aria-selected="false">Stats</button>
        </nav>
      </header>

      <p id="feedback" class="feedback" aria-live="polite"></p>

      <section id="tab-today" class="tab-panel is-active" role="tabpanel" aria-labelledby="tab-button-today"></section>
      <section id="tab-routines" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-routines" hidden></section>
      <section id="tab-todos" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-todos" hidden></section>
      <section id="tab-calendar" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-calendar" hidden></section>
      <section id="tab-stats" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-stats" hidden></section>

      <nav class="mobile-quick-nav panel" aria-label="Quick navigation">
        <button class="tab-button mobile-tab-button is-active" data-tab="today" type="button">Today</button>
        <button class="tab-button mobile-tab-button" data-tab="routines" type="button">Routines</button>
        <button class="tab-button mobile-tab-button" data-tab="todos" type="button">Todos</button>
        <button class="tab-button mobile-tab-button" data-tab="calendar" type="button">Calendar</button>
        <button class="tab-button mobile-tab-button" data-tab="stats" type="button">Stats</button>
      </nav>
    </main>
  </body>
</html>
