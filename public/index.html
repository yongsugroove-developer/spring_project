<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Planner</title>
    <meta name="description" content="My Planner" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <main class="app-shell planner-app">
      <div class="app-nav-shell">
        <div class="app-nav-bar">
          <div class="app-utility-start">
            <button class="app-nav-toggle" type="button" data-action="toggle-app-nav" aria-label="Open menu">
              <span></span><span></span><span></span>
            </button>
            <button id="app-utility-title" class="app-utility-title app-home-link" type="button" data-action="go-home">My Planner</button>
          </div>
          <div class="app-utility-actions"></div>
        </div>
        <button class="app-nav-backdrop" type="button" data-action="close-app-nav" aria-label="Close menu"></button>
        <aside class="app-nav-drawer" aria-label="Planner sections">
          <div class="app-nav-head">
            <div class="app-nav-title">
              <span id="app-nav-label">Menu</span>
              <strong id="app-nav-title">My Planner</strong>
            </div>
            <button class="app-nav-toggle" type="button" data-action="close-app-nav" aria-label="Close menu">
              <span></span><span></span><span></span>
            </button>
          </div>
          <nav class="app-nav-list">
            <button id="tab-button-account" class="app-nav-button" data-tab="account" data-route="/account" data-label-key="accountMenu" type="button">Account</button>
            <button id="tab-button-habits" class="app-nav-button" data-tab="habits" data-route="/habits" data-label-key="habitsMenu" type="button">Habits</button>
            <button id="tab-button-routines" class="app-nav-button" data-tab="routines" data-route="/routines" data-label-key="routinesMenu" type="button">Routines</button>
            <button id="tab-button-tasks" class="app-nav-button" data-tab="tasks" data-route="/tasks" data-label-key="tasksMenu" type="button">Tasks</button>
            <button id="tab-button-calendar" class="app-nav-button" data-tab="calendar" data-route="/calendar" data-label-key="calendar" type="button">Calendar</button>
            <button id="tab-button-stats" class="app-nav-button" data-tab="stats" data-route="/stats" data-label-key="stats" type="button">Stats</button>
            <button id="tab-button-settings" class="app-nav-button" data-tab="settings" data-route="/settings" data-label-key="settingsMenu" type="button">Settings</button>
          </nav>
        </aside>
      </div>

      <header class="planner-topbar">
        <div class="planner-topbar-copy">
          <p id="screen-label" class="eyebrow">my planner</p>
          <h1 id="screen-title" class="planner-screen-title">습관 타임테이블</h1>
          <p id="screen-copy" class="planner-screen-copy">습관을 메인 흐름으로 관리하고, 루틴은 묶음으로만 사용합니다.</p>
        </div>
      </header>

      <p id="feedback" class="feedback" aria-live="polite" hidden></p>

      <section id="tab-today" class="tab-panel is-active" role="tabpanel"></section>
      <section id="tab-account" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-account" hidden></section>
      <section id="tab-habits" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-habits" hidden></section>
      <section id="tab-tasks" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-tasks" hidden></section>
      <section id="tab-routines" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-routines" hidden></section>
      <section id="tab-calendar" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-calendar" hidden></section>
      <section id="tab-stats" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-stats" hidden></section>
      <section id="tab-settings" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-settings" hidden></section>
    </main>
  </body>
</html>
