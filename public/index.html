<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이 플래너</title>
    <meta name="description" content="마이 플래너" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/app-icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/app-icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js"></script>
    <script>
      if (["localhost", "127.0.0.1", "::1"].includes(window.location.hostname)) {
        const agentationBridge = document.createElement("script");
        agentationBridge.type = "module";
        agentationBridge.src = "/dev-agentation-bridge.js";
        document.head.append(agentationBridge);
      }
    </script>
  </head>
  <body>
    <main class="app-shell planner-app">
      <div class="app-nav-shell">
        <div class="app-nav-bar">
          <div class="app-utility-start">
            <button
              id="app-utility-title"
              class="app-utility-title app-home-link"
              type="button"
              data-action="go-home"
            >
              마이 플래너
            </button>
          </div>
          <div class="app-utility-actions">
            <div class="account-menu-shell">
              <button
                id="account-menu-trigger"
                class="account-menu-trigger"
                type="button"
                data-action="toggle-account-menu"
                aria-haspopup="menu"
                aria-expanded="false"
              >
                <span id="account-menu-name">계정</span>
                <small id="account-menu-meta">계정 / 모드 / 설정 / 통계</small>
              </button>
              <div class="account-menu-panel" role="menu" aria-label="계정 메뉴">
                <button
                  id="tab-button-account"
                  class="account-menu-link"
                  type="button"
                  data-route="/account"
                  data-label-key="accountMenu"
                >
                  계정
                </button>
                <button
                  id="tab-button-modes"
                  class="account-menu-link"
                  type="button"
                  data-route="/modes"
                  data-label-key="modesMenu"
                >
                  모드 설정
                </button>
                <button
                  id="tab-button-settings"
                  class="account-menu-link"
                  type="button"
                  data-route="/settings"
                  data-label-key="settingsMenu"
                >
                  보기 설정
                </button>
                <button
                  id="tab-button-stats"
                  class="account-menu-link"
                  type="button"
                  data-route="/stats"
                  data-label-key="stats"
                >
                  통계
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <header class="planner-topbar">
        <div class="planner-topbar-copy">
          <h1 id="screen-title" class="planner-screen-title">마이 플래너</h1>
          <p id="screen-copy" class="planner-screen-copy">개인 플래너</p>
        </div>
      </header>

      <p id="feedback" class="feedback" aria-live="polite" hidden></p>

      <section id="tab-today" class="tab-panel is-active" role="tabpanel"></section>
      <section id="tab-account" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-account" hidden></section>
      <section id="tab-modes" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-modes" hidden></section>
      <section id="tab-habits" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-habits" hidden></section>
      <section id="tab-tasks" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-tasks" hidden></section>
      <section id="tab-routines" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-routines" hidden></section>
      <section id="tab-calendar" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-calendar" hidden></section>
      <section id="tab-stats" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-stats" hidden></section>
      <section id="tab-settings" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-settings" hidden></section>

      <nav class="mobile-tab-bar" aria-label="주요 탐색">
        <button id="tab-button-today" class="mobile-tab-button" type="button" data-route="/today" data-label-key="today">
          홈
        </button>
        <button id="tab-button-habits" class="mobile-tab-button" type="button" data-route="/habits" data-label-key="habitsMenu">
          습관
        </button>
        <button id="tab-button-tasks" class="mobile-tab-button" type="button" data-route="/tasks" data-label-key="tasksMenu">
          작업
        </button>
        <button id="tab-button-routines" class="mobile-tab-button" type="button" data-route="/routines" data-label-key="routinesMenu">
          루틴
        </button>
        <button id="tab-button-calendar" class="mobile-tab-button" type="button" data-route="/calendar" data-label-key="calendar">
          캘린더
        </button>
      </nav>
    </main>
  </body>
</html>
