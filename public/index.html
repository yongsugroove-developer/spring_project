<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Planner</title>
    <meta name="description" content="My Planner" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <div class="app-nav-shell">
        <div class="app-nav-bar">
          <div class="app-utility-start">
            <button class="app-nav-toggle" type="button" data-action="toggle-app-nav" aria-label="Open menu">
              <span></span><span></span><span></span>
            </button>
            <strong id="app-utility-title" class="app-utility-title">My Planner</strong>
          </div>
          <div class="app-utility-actions">
            <button id="settings-button" class="settings-shortcut" type="button" data-action="open-settings">Settings</button>
            <button
              id="tab-button-account"
              class="user-entry user-entry--nav"
              type="button"
              data-action="open-account"
              aria-controls="tab-account"
              aria-expanded="false"
              hidden
            ></button>
          </div>
        </div>
        <button class="app-nav-backdrop" type="button" data-action="close-app-nav" aria-label="Close menu"></button>
        <aside class="app-nav-drawer" aria-label="Planner sections">
          <div class="app-nav-head">
            <button class="app-nav-toggle" type="button" data-action="close-app-nav" aria-label="Close menu">
              <span></span><span></span><span></span>
            </button>
            <div class="app-nav-title">
              <span id="app-nav-label">Menu</span>
              <strong id="app-nav-title">My Planner</strong>
            </div>
          </div>
          <nav class="app-nav-list" role="tablist">
            <button id="tab-button-today" class="app-nav-button is-active" data-tab="today" type="button" role="tab" aria-controls="tab-today" aria-selected="true">Today</button>
            <button id="tab-button-routines" class="app-nav-button" data-tab="routines" type="button" role="tab" aria-controls="tab-routines" aria-selected="false">Routines</button>
            <button id="tab-button-todos" class="app-nav-button" data-tab="todos" type="button" role="tab" aria-controls="tab-todos" aria-selected="false">Todos</button>
            <button id="tab-button-calendar" class="app-nav-button" data-tab="calendar" type="button" role="tab" aria-controls="tab-calendar" aria-selected="false">Calendar</button>
            <button id="tab-button-stats" class="app-nav-button" data-tab="stats" type="button" role="tab" aria-controls="tab-stats" aria-selected="false">Stats</button>
            <button id="tab-button-settings" class="app-nav-button" data-tab="settings" type="button" role="tab" aria-controls="tab-settings" aria-selected="false">Settings</button>
            <button id="tab-button-admin" class="app-nav-button" data-tab="admin" type="button" role="tab" aria-controls="tab-admin" aria-selected="false" hidden>Admin</button>
          </nav>
        </aside>
      </div>

      <header class="app-header">
        <section class="hero panel">
          <div class="hero-copy-block">
            <div class="hero-topline">
              <p class="eyebrow">my planner</p>
            </div>
            <h1 id="hero-title">Routine Assignment And Progress</h1>
            <p id="hero-copy" class="hero-copy">
              Manage routines, todos, calendar overrides, and statistics in one place.
            </p>
            <div id="hero-focus" class="hero-focus" aria-live="polite"></div>
          </div>
          <div class="hero-metrics">
            <div class="metric-card hero-metric-card hero-metric-card--set">
              <span id="hero-label-set">Today's Set</span>
              <strong id="hero-set">-</strong>
            </div>
            <div class="metric-card hero-metric-card hero-metric-card--rate">
              <span id="hero-label-rate">Today's Rate</span>
              <strong id="hero-rate">0%</strong>
            </div>
            <div class="metric-card hero-metric-card hero-metric-card--streak">
              <span id="hero-label-streak">Current Streak</span>
              <strong id="hero-streak">0 days</strong>
            </div>
            <div class="metric-card hero-metric-card hero-metric-card--date">
              <span id="hero-label-date">Base Date</span>
              <strong id="hero-date">-</strong>
            </div>
          </div>
        </section>

      </header>
      <p id="feedback" class="feedback" aria-live="polite"></p>

      <section id="tab-today" class="tab-panel is-active" role="tabpanel" aria-labelledby="tab-button-today"></section>
      <section id="tab-routines" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-routines" hidden></section>
      <section id="tab-todos" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-todos" hidden></section>
      <section id="tab-calendar" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-calendar" hidden></section>
      <section id="tab-stats" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-stats" hidden></section>
      <section id="tab-settings" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-settings" hidden></section>
      <section id="tab-account" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-account" hidden></section>
      <section id="tab-admin" class="tab-panel" role="tabpanel" aria-labelledby="tab-button-admin" hidden></section>

      <nav class="mobile-tab-bar" data-role="mobile-tab-bar">
        <button class="mobile-tab-button is-active" type="button" data-tab="today" aria-pressed="true">Today</button>
        <button class="mobile-tab-button" type="button" data-tab="routines" aria-pressed="false">Routines</button>
        <button class="mobile-tab-button" type="button" data-tab="todos" aria-pressed="false">Todos</button>
        <button class="mobile-tab-button" type="button" data-tab="calendar" aria-pressed="false">Calendar</button>
        <button class="mobile-tab-button" type="button" data-tab="stats" aria-pressed="false">Stats</button>
      </nav>
    </main>
  </body>
</html>
