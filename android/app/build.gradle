apply plugin: 'com.android.application'

def envOrBlank = { String key ->
    def value = System.getenv(key)
    return value == null ? "" : value.trim()
}

def parseVersionCode = { String value, int fallback ->
    if (!value) {
        return fallback
    }
    try {
        return Integer.parseInt(value)
    } catch (Exception ignored) {
        return fallback
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def propertyOrEnv = { String envKey, String propertyKey ->
    def envValue = envOrBlank(envKey)
    if (envValue) {
        return envValue
    }
    def propertyValue = keystoreProperties.getProperty(propertyKey)
    return propertyValue == null ? "" : propertyValue.trim()
}

def releaseVersionCode = parseVersionCode(envOrBlank('ANDROID_VERSION_CODE'), 1)
def releaseVersionName = envOrBlank('ANDROID_VERSION_NAME') ?: '1.0.0'
def releaseStoreFilePath = propertyOrEnv('ANDROID_KEYSTORE_PATH', 'storeFile')
def releaseStorePassword = propertyOrEnv('ANDROID_KEYSTORE_PASSWORD', 'storePassword')
def releaseKeyAlias = propertyOrEnv('ANDROID_KEY_ALIAS', 'keyAlias')
def releaseKeyPassword = propertyOrEnv('ANDROID_KEY_PASSWORD', 'keyPassword')
def hasReleaseSigning = releaseStoreFilePath && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace = "com.yongsugroove.myplanner"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.yongsugroove.myplanner"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode releaseVersionCode
        versionName releaseVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile rootProject.file(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

tasks.matching { it.name in ['assembleRelease', 'bundleRelease'] }.configureEach {
    doFirst {
        if (!hasReleaseSigning) {
            throw new GradleException(
                "Release signing is not configured. Set ANDROID_KEYSTORE_PATH, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD or create android/keystore.properties."
            )
        }

        def releaseStoreFile = rootProject.file(releaseStoreFilePath)
        if (!releaseStoreFile.exists()) {
            throw new GradleException("Android keystore file not found: ${releaseStoreFile}")
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
